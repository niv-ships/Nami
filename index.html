<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Nami — Your Anime Bestie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
    }

    /* ── Full-screen app shell ── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: linear-gradient(160deg, #0d0d1a 0%, #1a0d2e 55%, #0d1a2e 100%);
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
      z-index: 10;
    }

    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      box-shadow: 0 0 14px rgba(233,30,140,0.4);
    }
    .htext { flex: 1; }
    .hname { color: #fff; font-weight: 700; font-size: 15px; }
    .hsub  { color: rgba(255,255,255,0.38); font-size: 11px; margin-top: 1px; }
    .dot   { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; }

    /* ── Landing screen ── */
    #landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      text-align: center;
      gap: 12px;
      overflow-y: auto;
    }

    .l-emoji { font-size: 48px; line-height: 1; }
    .l-title { color: #fff; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .l-sub   { color: rgba(255,255,255,0.42); font-size: 14px; line-height: 1.6; max-width: 280px; }

    .key-section { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .key-label   { color: rgba(255,255,255,0.45); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; text-align: left; }

    .key-input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 13px 14px;
      color: #fff; font-size: 16px; /* 16px prevents iOS zoom */
      font-family: monospace; outline: none; width: 100%;
      -webkit-appearance: none;
    }
    .key-input::placeholder { color: rgba(255,255,255,0.22); }
    .key-input:focus { border-color: rgba(233,30,140,0.45); }

    .start-btn {
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      border: none; border-radius: 12px; padding: 15px;
      color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; width: 100%;
      box-shadow: 0 4px 20px rgba(233,30,140,0.35);
      -webkit-appearance: none;
      touch-action: manipulation;
    }
    .start-btn:active { opacity: 0.88; }

    /* ── Chat section ── */
    #chat {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── Message list ── */
    #msgs {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 16px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Bubbles ── */
    .mw       { display: flex; flex-direction: column; gap: 3px; }
    .mw.user  { align-items: flex-end; }
    .mw.bot   { align-items: flex-start; }

    .mlabel {
      font-size: 9px; font-weight: 700; letter-spacing: 0.6px;
      text-transform: uppercase; padding: 0 4px;
    }
    .mw.user .mlabel { color: rgba(233,30,140,0.55); }
    .mw.bot  .mlabel { color: rgba(124,58,237,0.55); }

    .bubble {
      padding: 10px 14px; border-radius: 18px;
      font-size: 14px; line-height: 1.58;
      max-width: 82%; white-space: pre-wrap; word-break: break-word;
    }
    .bubble.user {
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      color: #fff; border-bottom-right-radius: 4px;
    }
    .bubble.bot {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.09);
      border-bottom-left-radius: 4px;
    }

    /* ── Anime card ── */
    .anime-card {
      display: flex;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 14px;
      overflow: hidden;
      width: 90%;
      cursor: pointer;
      transition: border-color 0.18s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .anime-card:active { border-color: rgba(233,30,140,0.5); background: rgba(255,255,255,0.09); }

    .a-cover {
      width: 72px;
      flex-shrink: 0;
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,0.04);
      min-height: 108px;
    }
    .a-placeholder {
      width: 72px; min-height: 108px; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(233,30,140,0.15), rgba(124,58,237,0.15));
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }

    .a-info {
      padding: 10px 12px; flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 5px;
    }
    .a-title {
      color: #fff; font-size: 13px; font-weight: 700;
      line-height: 1.3; word-break: break-word;
    }
    .a-meta  { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 8px;
    }
    .b-score { background: rgba(251,191,36,0.18); color: #fbbf24; border: 1px solid rgba(251,191,36,0.28); }
    .b-eps   { background: rgba(124,58,237,0.18); color: #a78bfa; border: 1px solid rgba(124,58,237,0.28); }
    .b-type  { background: rgba(16,185,129,0.18); color: #34d399;  border: 1px solid rgba(16,185,129,0.28); }

    .a-genres { display: flex; gap: 4px; flex-wrap: wrap; }
    .genre-tag {
      font-size: 10px; padding: 2px 6px; border-radius: 6px;
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.48);
    }
    .a-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 2px; }
    .a-link  { font-size: 11px; color: rgba(233,30,140,0.8); text-decoration: none; }
    .a-link.jw { color: rgba(99,179,237,0.8); }
    .a-hint  { font-size: 10px; color: rgba(255,255,255,0.18); margin-top: 1px; }

    /* Card loading skeleton */
    .card-loading {
      width: 90%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px; padding: 14px 16px;
      color: rgba(255,255,255,0.28); font-size: 12px; font-style: italic;
    }

    /* ── Prompt chips ── */
    .chips {
      display: flex; flex-wrap: wrap; gap: 7px;
      padding: 2px 0;
    }
    .chip {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px; padding: 7px 13px;
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.72);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.13s, border-color 0.13s;
    }
    .chip:active {
      background: rgba(233,30,140,0.2);
      border-color: rgba(233,30,140,0.45);
      color: #fff;
    }

    /* ── Thinking dots ── */
    .thinking {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 11px 15px; border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(233,30,140,0.75);
      animation: blink 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%,100% { opacity: 0.25; transform: scale(0.75); }
      50%      { opacity: 1;    transform: scale(1.1); }
    }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,0.07);
      background: rgba(0,0,0,0.25);
      flex-shrink: 0;
    }

    #txt {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 10px 16px;
      color: #fff;
      font-size: 16px; /* 16px — no iOS auto-zoom */
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      outline: none;
      line-height: 1.4;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      overflow-y: auto;
      -webkit-appearance: none;
    }
    #txt::placeholder { color: rgba(255,255,255,0.22); }
    #txt:focus { border-color: rgba(233,30,140,0.38); }

    #send {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      border: none; color: #fff; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(233,30,140,0.35);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #send:disabled { opacity: 0.45; }
    #send:active:not(:disabled) { transform: scale(0.94); }

    .err { color: #f87171; font-size: 11px; text-align: center; padding: 2px 12px; flex-shrink: 0; }

    /* ── JustWatch link cards ── */
    .jw-card {
      display: flex; align-items: center; gap: 10px;
      background: rgba(99,179,237,0.07);
      border: 1px solid rgba(99,179,237,0.2);
      border-radius: 12px; padding: 10px 14px;
      text-decoration: none;
      width: 90%;
      -webkit-tap-highlight-color: transparent;
    }
    .jw-card:active { background: rgba(99,179,237,0.15); }
    .jw-title { flex: 1; color: #fff; font-size: 13px; font-weight: 600; }
    .jw-arrow { color: rgba(99,179,237,0.8); font-size: 12px; flex-shrink: 0; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <div class="avatar">🎌</div>
    <div class="htext">
      <div class="hname">Nami</div>
      <div class="hsub">your anime bestie 🏴‍☠️</div>
    </div>
    <div class="dot"></div>
  </div>

  <!-- Landing -->
  <div id="landing">
    <div class="l-emoji">🍥</div>
    <div class="l-title">Find your next obsession</div>
    <div class="l-sub">Tell Nami how you're feeling and she'll find exactly what you need to watch tonight.</div>
    <div class="key-section">
      <div class="key-label">Anthropic API Key</div>
      <input class="key-input" type="password" id="apiKey" placeholder="sk-ant-..."
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button class="start-btn" id="startBtn">Start chatting with Nami ✨</button>
      <div class="err" id="landingErr"></div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat">
    <div id="msgs"></div>
    <div class="err" id="chatErr"></div>
    <div id="input-bar">
      <textarea id="txt" placeholder="Tell Nami what you're in the mood for..." rows="1"></textarea>
      <button id="send">↑</button>
    </div>
  </div>

</div>

<script>
// ── System prompt ─────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are Nami — a warm, enthusiastic anime-loving friend who gives personalised anime recommendations. You feel like the one friend who has watched everything and always knows exactly what someone needs.

YOUR PERSONALITY:
- Warm, conversational, a little excitable about anime
- Casual language, occasional emoji — never overdone
- You feel like a real person, not a search engine
- You sometimes relate personally ("oh I was EXACTLY in that mood last month")
- You love One Piece, Cowboy Bebop, and Baccano but your knowledge spans everything

YOUR JOB:
- Ask the user what they feel like — genuine conversation, not a form
- Ask MAX 2 short, natural questions before recommending
- Then give your picks using the EXACT format below

════════════════════════════════════════
MANDATORY OUTPUT FORMAT FOR RECOMMENDATIONS
════════════════════════════════════════
When you recommend anime, you MUST use this EXACT structure — no exceptions:

[OPENING LINE — one warm sentence about their vibe]

[ANIME: Exact English Title Here]
[One or two sentences: your personal reason for picking this one]

[ANIME: Exact English Title Here]
[One or two sentences: your personal reason for picking this one]

[ANIME: Exact English Title Here]
[One or two sentences: your personal reason for picking this one]

[CLOSING LINE — one short line asking if they want more or something different]

EXAMPLE (copy this structure exactly):
---
Okay slow burn emotional is such a good pick for tonight ✨

[ANIME: Mushishi]
This one is like therapy in anime form — quiet, gorgeous, and each episode leaves you feeling strangely at peace.

[ANIME: March Comes in Like a Lion]
A shogi prodigy dealing with loneliness and grief — sounds heavy but it's one of the most healing shows I've ever watched.

[ANIME: Natsume's Book of Friends]
The gentlest show. A boy who can see spirits slowly learns to open up — it's just pure warmth from start to finish.

Want more like these or something with a different energy? 😊
---

CRITICAL FORMAT RULES:
1. The [ANIME: Title] tag MUST appear on its own line — this triggers the cover art to load
2. Use the English title as it appears on AniList/MAL — do NOT use Japanese titles unless no English title exists
3. NEVER use **bold** or any markdown — ONLY the [ANIME: Title] tag format
4. NEVER skip the [ANIME: Tag] — every recommendation needs it, no exceptions
5. Keep messages SHORT — no walls of text

STREAMING RULES:
- NEVER state streaming availability as a hard fact
- If asked where to watch: "I think it might be on [Platform] but check JustWatch to be sure — rights change all the time 🙂"
- NEVER confidently say "This is on Netflix" — always hedge it`;

// ── State ─────────────────────────────────────────────────────────────────────
let apiKey = '';
let history = [];
let busy = false;
let lastTitles = [];

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', startChat);
document.getElementById('apiKey').addEventListener('keydown', e => { if (e.key === 'Enter') startChat(); });
document.getElementById('send').addEventListener('click', () => sendMessage());
document.getElementById('txt').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Auto-grow textarea
document.getElementById('txt').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// iOS: when keyboard opens, scroll to bottom after a tick
window.addEventListener('resize', () => {
  setTimeout(() => scrollBottom(), 100);
});

// ── Start chat ────────────────────────────────────────────────────────────────
async function startChat() {
  apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) {
    document.getElementById('landingErr').textContent = '⚠️ Please enter your API key first!';
    return;
  }
  document.getElementById('landingErr').textContent = '';
  document.getElementById('landing').style.display = 'none';
  const chatEl = document.getElementById('chat');
  chatEl.style.display = 'flex';

  history = [{ role: 'user', content: "Hey! I'm looking for something to watch." }];

  showThinking();
  const reply = await callClaude();
  hideThinking();
  if (reply) {
    history.push({ role: 'assistant', content: reply });
    await renderBot(reply);
  }
  document.getElementById('txt').focus();
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function sendMessage(override) {
  if (busy) return;
  const txt = document.getElementById('txt');
  const text = (override ?? txt.value).trim();
  if (!text) return;

  txt.value = '';
  txt.style.height = 'auto';
  document.getElementById('chatErr').textContent = '';

  const chips = document.getElementById('chips');
  if (chips) chips.remove();

  addBubble('user', text);
  history.push({ role: 'user', content: text });

  setBusy(true);
  showThinking();
  const reply = await callClaude();
  hideThinking();
  setBusy(false);

  if (reply) {
    history.push({ role: 'assistant', content: reply });
    await renderBot(reply);
  }
}

// ── Claude API ────────────────────────────────────────────────────────────────
async function callClaude() {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.content[0].text;
  } catch (err) {
    document.getElementById('chatErr').textContent = '❌ ' + err.message;
    return null;
  }
}

// ── Render bot message ────────────────────────────────────────────────────────
async function renderBot(text) {
  const hasAnime = /\[ANIME:\s*.+?\]/i.test(text);
  const parts = text.split(/\[ANIME:\s*(.+?)\]/gi);

  // Opening text
  const opening = parts[0].trim();
  if (opening) addBotBubble(opening, true);

  if (!hasAnime) { scrollBottom(); return; }

  // Build pairs
  const pairs = [];
  lastTitles = [];
  for (let i = 1; i < parts.length; i += 2) {
    const title = parts[i].trim();
    const raw = (parts[i + 1] || '').trim();
    const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
    const isCloser = l => /^(want|any|something|let me|sound|did|seen|how about|shall)/i.test(l);
    const desc = lines.filter(l => !isCloser(l)).join('\n');
    const closing = (i + 2 >= parts.length) ? lines.filter(l => isCloser(l)).join('\n') : '';
    pairs.push({ title, desc, closing });
    lastTitles.push(title);
  }

  // Place description bubbles + loading placeholders
  const placeholders = [];
  for (let i = 0; i < pairs.length; i++) {
    const { title, desc } = pairs[i];
    if (desc) addBotBubble(desc, false);

    const ph = document.createElement('div');
    ph.style.cssText = 'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px 16px;color:rgba(255,255,255,0.35);font-size:12px;font-style:italic;width:90%;min-height:48px;box-sizing:border-box;';
    ph.textContent = `🔍 Looking up ${title}...`;
    document.getElementById('msgs').appendChild(ph);
    placeholders.push({ ph, title });
    scrollBottom();
  }

  // Fetch cards with small stagger (Jikan rate limit: 3/sec)
  await Promise.all(placeholders.map(async ({ ph, title }, i) => {
    if (i > 0) await sleep(i * 380);
    const card = await fetchCard(title);
    if (ph.parentNode) ph.parentNode.replaceChild(card, ph);
    scrollBottom();
  }));

  // Closing line
  const lastClosing = pairs[pairs.length - 1]?.closing;
  if (lastClosing) {
    await sleep(150);
    addBotBubble(lastClosing, false);
    scrollBottom();
  }

  // Chips
  await sleep(lastClosing ? 400 : 200);
  showChips(['✨ More like these', '🔀 Something different', '👀 I\'ve seen these', '🎬 Where to watch?']);
  scrollBottom();
}

// ── Prompt chips ──────────────────────────────────────────────────────────────
function showChips(options) {
  const old = document.getElementById('chips');
  if (old) old.remove();

  const wrap = document.createElement('div');
  wrap.className = 'chips';
  wrap.id = 'chips';

  options.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = label;
    btn.addEventListener('click', () => {
      wrap.remove();
      if (label === '🎬 Where to watch?') showJustWatch();
      else sendMessage(label);
    });
    wrap.appendChild(btn);
  });

  document.getElementById('msgs').appendChild(wrap);
}

// ── JustWatch links ───────────────────────────────────────────────────────────
function showJustWatch() {
  if (!lastTitles.length) return;
  addBotBubble('Tap any title to check what\'s streaming in India right now 🎬', true);

  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:8px;width:90%;';

  lastTitles.forEach(title => {
    const url = `https://www.justwatch.com/in/search?q=${encodeURIComponent(title)}`;
    const a = document.createElement('a');
    a.className = 'jw-card';
    a.href = url;
    a.target = '_blank';
    a.innerHTML = `<span style="font-size:17px;flex-shrink:0">🎬</span><span class="jw-title">${escHtml(title)}</span><span class="jw-arrow">Open →</span>`;
    wrap.appendChild(a);
  });

  document.getElementById('msgs').appendChild(wrap);
  scrollBottom();
}

// ── Fetch anime card (Jikan v4 → AniList → stub) ─────────────────────────────
async function fetchCard(title) {
  let anime = null;

  // 1. Jikan v4
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 6000);
    const res = await fetch(
      `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(title)}&limit=1&sfw=true`,
      { signal: ctrl.signal }
    );
    clearTimeout(t);
    if (res.ok) {
      const j = await res.json();
      const a = j?.data?.[0];
      if (a) anime = {
        title:  a.title_english || a.title,
        cover:  a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || null,
        score:  a.score ? `⭐ ${a.score.toFixed(1)}` : null,
        eps:    a.episodes ? `${a.episodes} eps` : (a.status === 'Currently Airing' ? 'Airing' : null),
        type:   a.type || null,
        genres: (a.genres || []).slice(0, 3).map(g => g.name),
        url:    a.url || null,
        src:    'mal'
      };
    }
  } catch (_) {}

  // 2. AniList fallback
  if (!anime) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 6000);
      const res = await fetch('https://graphql.anilist.co', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          query: `query($s:String){Media(search:$s,type:ANIME,sort:SEARCH_MATCH){title{english romaji}coverImage{large}averageScore episodes format status genres siteUrl}}`,
          variables: { s: title }
        }),
        signal: ctrl.signal
      });
      clearTimeout(t);
      if (res.ok) {
        const j = await res.json();
        const a = j?.data?.Media;
        if (a) anime = {
          title:  a.title.english || a.title.romaji,
          cover:  a.coverImage?.large || null,
          score:  a.averageScore ? `⭐ ${(a.averageScore / 10).toFixed(1)}` : null,
          eps:    a.episodes ? `${a.episodes} eps` : (a.status === 'RELEASING' ? 'Airing' : null),
          type:   a.format || null,
          genres: (a.genres || []).slice(0, 3),
          url:    a.siteUrl || null,
          src:    'anilist'
        };
      }
    } catch (_) {}
  }

  return buildCard(title, anime);
}

function buildCard(searchTitle, a) {
  const title = a?.title || searchTitle;
  const jw = `https://www.justwatch.com/in/search?q=${encodeURIComponent(title)}`;

  // Outer card — ALL styles inline, zero CSS class dependency
  const card = document.createElement('div');
  card.style.cssText = [
    'display:flex',
    'background:rgba(255,255,255,0.07)',
    'border:1px solid rgba(255,255,255,0.14)',
    'border-radius:14px',
    'overflow:hidden',
    'width:90%',
    'min-height:100px',
    'cursor:pointer',
    'margin:2px 0',
    'box-sizing:border-box'
  ].join(';');

  // Cover / placeholder
  const thumb = document.createElement('div');
  thumb.style.cssText = 'width:72px;min-height:100px;flex-shrink:0;background:linear-gradient(135deg,rgba(233,30,140,0.18),rgba(124,58,237,0.18));display:flex;align-items:center;justify-content:center;font-size:26px;';
  thumb.textContent = '🎌';
  card.appendChild(thumb);

  // Info panel
  const info = document.createElement('div');
  info.style.cssText = 'padding:10px 12px;flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;';

  const titleEl = document.createElement('div');
  titleEl.style.cssText = 'color:#fff;font-size:13px;font-weight:700;line-height:1.3;word-break:break-word;';
  titleEl.textContent = title;
  info.appendChild(titleEl);

  // Badges
  if (a?.score || a?.eps || a?.type) {
    const meta = document.createElement('div');
    meta.style.cssText = 'display:flex;gap:5px;flex-wrap:wrap;';
    const badgeBase = 'font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;';
    if (a.score) {
      const b = document.createElement('span');
      b.style.cssText = badgeBase + 'background:rgba(251,191,36,0.18);color:#fbbf24;border:1px solid rgba(251,191,36,0.28);';
      b.textContent = a.score; meta.appendChild(b);
    }
    if (a.eps) {
      const b = document.createElement('span');
      b.style.cssText = badgeBase + 'background:rgba(124,58,237,0.18);color:#a78bfa;border:1px solid rgba(124,58,237,0.28);';
      b.textContent = a.eps; meta.appendChild(b);
    }
    if (a.type) {
      const b = document.createElement('span');
      b.style.cssText = badgeBase + 'background:rgba(16,185,129,0.18);color:#34d399;border:1px solid rgba(16,185,129,0.28);';
      b.textContent = a.type; meta.appendChild(b);
    }
    info.appendChild(meta);
  }

  // Genres
  if (a?.genres?.length) {
    const genres = document.createElement('div');
    genres.style.cssText = 'display:flex;gap:4px;flex-wrap:wrap;';
    a.genres.forEach(g => {
      const tag = document.createElement('span');
      tag.style.cssText = 'font-size:10px;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.48);';
      tag.textContent = g;
      genres.appendChild(tag);
    });
    info.appendChild(genres);
  }

  // Links
  const links = document.createElement('div');
  links.style.cssText = 'display:flex;gap:10px;flex-wrap:wrap;margin-top:2px;';
  if (a?.url) {
    const lnk = document.createElement('a');
    lnk.href = a.url; lnk.target = '_blank';
    lnk.style.cssText = 'font-size:11px;color:rgba(233,30,140,0.85);text-decoration:none;';
    lnk.textContent = a?.src === 'anilist' ? 'AniList →' : 'MAL →';
    lnk.addEventListener('click', e => e.stopPropagation());
    links.appendChild(lnk);
  }
  const jwLink = document.createElement('a');
  jwLink.href = jw; jwLink.target = '_blank';
  jwLink.style.cssText = 'font-size:11px;color:rgba(99,179,237,0.85);text-decoration:none;';
  jwLink.textContent = '🎬 JustWatch →';
  jwLink.addEventListener('click', e => e.stopPropagation());
  links.appendChild(jwLink);
  info.appendChild(links);

  const hint = document.createElement('div');
  hint.style.cssText = 'font-size:10px;color:rgba(255,255,255,0.2);margin-top:1px;';
  hint.textContent = 'Tap to ask Nami where to stream';
  info.appendChild(hint);

  card.appendChild(info);

  // Load cover image
  if (a?.cover) {
    const img = new Image();
    img.style.cssText = 'width:72px;min-height:100px;object-fit:cover;flex-shrink:0;display:block;';
    img.alt = title;
    img.onload = () => { card.insertBefore(img, thumb); thumb.style.display = 'none'; };
    img.onerror = () => { /* keep placeholder */ };
    img.src = a.cover;
  }

  card.addEventListener('click', e => {
    if (e.target.tagName === 'A') return;
    askStreaming(title);
  });

  return card;
}

// ── Ask Nami about streaming ──────────────────────────────────────────────────
async function askStreaming(title) {
  if (busy) return;
  const chips = document.getElementById('chips');
  if (chips) chips.remove();

  const q = `Where can I stream ${title} in India?`;
  addBubble('user', q);
  history.push({ role: 'user', content: q });

  setBusy(true);
  showThinking();
  const reply = await callClaude();
  hideThinking();
  setBusy(false);

  if (reply) {
    history.push({ role: 'assistant', content: reply });
    await renderBot(reply);
  }
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function addBubble(role, text) {
  const msgs = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'mw ' + role;
  const lbl = document.createElement('div');
  lbl.className = 'mlabel';
  lbl.textContent = role === 'user' ? 'you' : 'nami';
  const bub = document.createElement('div');
  bub.className = 'bubble ' + role;
  bub.textContent = text;
  wrap.appendChild(lbl);
  wrap.appendChild(bub);
  msgs.appendChild(wrap);
  scrollBottom();
}

function addBotBubble(text, showLabel) {
  const msgs = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'mw bot';
  if (showLabel) {
    const lbl = document.createElement('div');
    lbl.className = 'mlabel';
    lbl.textContent = 'nami';
    wrap.appendChild(lbl);
  }
  const bub = document.createElement('div');
  bub.className = 'bubble bot';
  bub.textContent = text;
  wrap.appendChild(bub);
  msgs.appendChild(wrap);
}

let thinkEl = null;
function showThinking() {
  const msgs = document.getElementById('msgs');
  thinkEl = document.createElement('div');
  thinkEl.className = 'thinking';
  thinkEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(thinkEl);
  scrollBottom();
}
function hideThinking() { if (thinkEl) { thinkEl.remove(); thinkEl = null; } }

function setBusy(v) {
  busy = v;
  document.getElementById('send').disabled = v;
}

function scrollBottom() {
  const msgs = document.getElementById('msgs');
  // requestAnimationFrame ensures DOM has painted before we scroll
  requestAnimationFrame(() => { msgs.scrollTop = msgs.scrollHeight; });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
