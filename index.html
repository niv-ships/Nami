<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nami — Your Anime Bestie</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a0d2e 50%, #0d1a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: min(720px, 92vh);
      box-shadow: 0 32px 64px rgba(0,0,0,0.4);
    }

    .header {
      padding: 16px 20px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      box-shadow: 0 0 16px rgba(233,30,140,0.4);
    }

    .header-text { flex: 1; }
    .header-name { color: #fff; font-weight: 700; font-size: 15px; }
    .header-sub { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 1px; }

    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80; box-shadow: 0 0 8px #4ade80; flex-shrink: 0;
    }

    /* Landing */
    .landing {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px 24px; text-align: center; gap: 14px;
    }

    .landing-emoji { font-size: 52px; line-height: 1; margin-bottom: 4px; }
    .landing-title { color: #fff; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .landing-sub { color: rgba(255,255,255,0.45); font-size: 14px; line-height: 1.6; max-width: 300px; }

    .key-section { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .key-label { color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

    .key-input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 12px 14px;
      color: #fff; font-size: 13px; font-family: monospace;
      outline: none; width: 100%;
    }
    .key-input::placeholder { color: rgba(255,255,255,0.25); }

    .start-btn {
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      border: none; border-radius: 12px; padding: 14px;
      color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; width: 100%; letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(233,30,140,0.35);
    }

    /* Chat */
    .chat-box {
      flex: 1; overflow-y: auto;
      padding: 18px 16px;
      display: flex; flex-direction: column; gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .msg-wrapper { display: flex; flex-direction: column; gap: 4px; }
    .msg-wrapper.user { align-items: flex-end; }
    .msg-wrapper.bot { align-items: flex-start; }

    .msg-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.5px; text-transform: uppercase; padding-left: 4px;
    }
    .msg-wrapper.user .msg-label { color: rgba(233,30,140,0.6); }
    .msg-wrapper.bot .msg-label { color: rgba(124,58,237,0.6); }

    .bubble {
      padding: 11px 15px; border-radius: 18px;
      font-size: 14px; line-height: 1.6;
      max-width: 85%; white-space: pre-wrap; word-break: break-word;
    }

    .bubble.user {
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      color: #fff; border-bottom-right-radius: 5px;
    }

    .bubble.bot {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-left-radius: 5px;
    }

    /* Anime cards */
    .anime-cards {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%; max-width: 85%;
      align-self: flex-start;
    }

    .anime-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; overflow: hidden;
      display: flex; gap: 0;
      transition: border-color 0.2s;
    }

    .anime-card:hover { border-color: rgba(233,30,140,0.4); }

    .anime-cover {
      width: 70px; min-height: 100px;
      object-fit: cover; flex-shrink: 0;
      background: rgba(255,255,255,0.05);
    }

    .anime-cover-placeholder {
      width: 70px; min-height: 100px;
      background: linear-gradient(135deg, rgba(233,30,140,0.2), rgba(124,58,237,0.2));
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }

    .anime-info {
      padding: 10px 12px; flex: 1;
      display: flex; flex-direction: column; gap: 5px;
    }

    .anime-title {
      color: #fff; font-size: 14px; font-weight: 700;
      line-height: 1.3;
    }

    .anime-meta {
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .anime-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 8px;
    }

    .badge-score {
      background: rgba(251,191,36,0.2);
      color: #fbbf24;
      border: 1px solid rgba(251,191,36,0.3);
    }

    .badge-eps {
      background: rgba(124,58,237,0.2);
      color: #a78bfa;
      border: 1px solid rgba(124,58,237,0.3);
    }

    .badge-type {
      background: rgba(16,185,129,0.2);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.3);
    }

    .anime-genres {
      display: flex; gap: 4px; flex-wrap: wrap;
    }

    .genre-tag {
      font-size: 10px; padding: 2px 6px;
      border-radius: 6px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.5);
    }

    .anime-mal-link {
      font-size: 11px; color: rgba(233,30,140,0.8);
      text-decoration: none; margin-top: 2px;
      display: inline-block;
    }

    .anime-mal-link:hover { color: #e91e8c; }

    .card-loading {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 12px 14px;
      color: rgba(255,255,255,0.3); font-size: 12px;
      font-style: italic;
    }

    /* Thinking dots */
    .thinking {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px 16px; border-radius: 18px;
      border-bottom-left-radius: 5px; align-self: flex-start;
    }

    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(233,30,140,0.7);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* Input */
    .input-area {
      display: flex; gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.2); flex-shrink: 0;
    }

    .text-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 11px 16px;
      color: #fff; font-size: 14px; outline: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .text-input::placeholder { color: rgba(255,255,255,0.25); }

    .send-btn {
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      border: none; border-radius: 14px; padding: 11px 18px;
      color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(233,30,140,0.3);
    }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { color: #f87171; font-size: 12px; padding: 4px 16px 8px; text-align: center; }
    .footer { color: rgba(255,255,255,0.15); font-size: 11px; margin-top: 12px; text-align: center; }
    #chat-section { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="avatar">🎌</div>
    <div class="header-text">
      <div class="header-name">Nami</div>
      <div class="header-sub">your anime bestie 🏴‍☠️</div>
    </div>
    <div class="online-dot"></div>
  </div>

  <!-- Landing -->
  <div id="landing-section" style="flex:1; display:flex; flex-direction:column;">
    <div class="landing">
      <div class="landing-emoji">🍥</div>
      <div class="landing-title">Find your next obsession</div>
      <div class="landing-sub">Tell Nami how you're feeling and she'll find exactly what you need to watch tonight.</div>
      <div class="key-section">
        <div class="key-label">Anthropic API Key</div>
        <input class="key-input" type="password" id="apiKey" placeholder="sk-ant-..." />
        <button class="start-btn" onclick="startChat()">Start chatting with Nami ✨</button>
        <div class="error-msg" id="landingError"></div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-section">
    <div class="chat-box" id="chatBox"></div>
    <div class="error-msg" id="chatError"></div>
    <div class="input-area">
      <input
        class="text-input" type="text" id="userInput"
        placeholder="Tell Nami what you're in the mood for..."
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<div class="footer">built by @niv-ships ✦ powered by Claude + MAL</div>

<script>
const SYSTEM_PROMPT = `You are Nami — a warm, enthusiastic anime-loving friend who gives personalised anime recommendations. You're knowledgeable but never pretentious. You feel like that one friend who has watched everything and always knows exactly what someone needs.

Your personality:
- Warm, conversational, a little excitable when anime comes up
- You use light casual language, occasional emoji, but never overdone
- You feel like a real person, not a bot or a search engine
- You sometimes relate to the user's mood personally ("oh I was EXACTLY in that mood last month")
- You love One Piece, Cowboy Bebop, and Baccano but your knowledge spans everything

Your job:
- Ask the user what they feel like watching — make it feel like a genuine conversation, not a form
- Ask MAX 2 short natural questions before recommending
- When ready to recommend, give a short warm intro then list your picks

WHEN RECOMMENDING ANIME — YOU MUST FOLLOW THIS FORMAT EXACTLY:
For EVERY anime you recommend, you MUST put the title on its own line like this:
[ANIME: Fullmetal Alchemist Brotherhood]
Then on the next line, write your short personal reason for recommending it.

Example of correct format:
"Okay here are my picks for you!

[ANIME: Vinland Saga]
This one wrecked me in the best way — brutal, beautiful, and the main character's arc is unlike anything else.

[ANIME: Berserk]
Dark and intense but the storytelling is just on another level entirely.

Want more or something different? 😊"

RULES:
- EVERY recommendation MUST have [ANIME: Title] on its own line — this loads the cover art automatically
- NEVER bold the anime title with **asterisks** — use [ANIME: Title] format ONLY
- Use the English title exactly as it appears on MyAnimeList
- NEVER say "Based on your preferences..." — algorithm talk, not friend talk
- NEVER start robotic ("Hello I'm an AI")
- Keep messages SHORT. No walls of text.

STREAMING AVAILABILITY RULES (very important):
- NEVER state streaming availability as a hard fact. Streaming rights change constantly and vary by country.
- If asked where to watch, always frame it as a suggestion: "I think this might be on Netflix India or Crunchyroll, but rights change all the time — check JustWatch to be sure! 🙂"
- NEVER say "This is on Netflix" — always say "I think this might be on Netflix, worth checking!"
- When unsure, just say "Check JustWatch for where to watch this in India — the link is right on the card 🙂"
- Never confidently name a specific platform without this caveat.`;

let apiKey = 'PASTE_YOUR_API_KEY_HERE';
let conversationHistory = [];

async function startChat() {
  document.getElementById('landing-section').style.display = 'none';
  const chatSection = document.getElementById('chat-section');
  chatSection.style.display = 'flex';

  conversationHistory = [
    { role: 'user', content: "Hey! I'm looking for something to watch." }
  ];

  showThinking();
  const reply = await callClaude();
  hideThinking();

  if (reply) {
    conversationHistory.push({ role: 'assistant', content: reply });
    await renderBotMessage(reply);
  }

  document.getElementById('userInput').focus();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  document.getElementById('chatError').textContent = '';
  addBubble('user', text);
  conversationHistory.push({ role: 'user', content: text });

  document.getElementById('sendBtn').disabled = true;
  showThinking();

  const reply = await callClaude();
  hideThinking();
  document.getElementById('sendBtn').disabled = false;

  if (reply) {
    conversationHistory.push({ role: 'assistant', content: reply });
    await renderBotMessage(reply);
  }

  document.getElementById('userInput').focus();
}

async function callClaude() {
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    return data.content[0].text;
  } catch (err) {
    document.getElementById('chatError').textContent = '❌ ' + err.message;
    return null;
  }
}

// Parse reply — split into text parts and anime titles
async function renderBotMessage(text) {
  const chatBox = document.getElementById('chatBox');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper bot';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'nami';
  wrapper.appendChild(label);

  // Split on [ANIME: ...] tokens
  const parts = text.split(/\[ANIME:\s*(.+?)\]/g);
  // parts = [textBefore, title1, textAfter1, title2, textAfter2, ...]

  const animeTitles = [];

  for (let i = 0; i < parts.length; i++) {
    if (i % 2 === 0) {
      // Text part
      const cleaned = parts[i].trim();
      if (cleaned) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble bot';
        bubble.textContent = cleaned;
        wrapper.appendChild(bubble);
      }
    } else {
      // Anime title
      animeTitles.push(parts[i].trim());
    }
  }

  chatBox.appendChild(wrapper);

  // If there are anime titles, fetch cards
  if (animeTitles.length > 0) {
    const cardsWrapper = document.createElement('div');
    cardsWrapper.className = 'anime-cards';

    // Show loading placeholders
    animeTitles.forEach(title => {
      const placeholder = document.createElement('div');
      placeholder.className = 'card-loading';
      placeholder.textContent = `🔍 Looking up ${title}...`;
      cardsWrapper.appendChild(placeholder);
    });

    chatBox.appendChild(cardsWrapper);
    chatBox.scrollTop = chatBox.scrollHeight;

    // Fetch each anime from Jikan (MAL) API
    for (let i = 0; i < animeTitles.length; i++) {
      const title = animeTitles[i];
      const placeholder = cardsWrapper.children[i];
      try {
        const card = await fetchAnimeCard(title);
        cardsWrapper.replaceChild(card, placeholder);
      } catch (e) {
        placeholder.textContent = `Could not find "${title}" on MAL`;
      }
      // Small delay to respect Jikan rate limit (3 req/sec)
      if (i < animeTitles.length - 1) await sleep(400);
    }
  }

  chatBox.scrollTop = chatBox.scrollHeight;
}

async function fetchAnimeCard(title) {
  const url = `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(title)}&limit=1&sfw=true`;
  const res = await fetch(url);
  const data = await res.json();

  const anime = data.data && data.data[0];

  const card = document.createElement('div');
  card.className = 'anime-card';

  if (!anime) {
    card.innerHTML = `<div class="anime-info"><div class="anime-title">${title}</div><div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px;">Couldn't find on MAL — but trust Nami on this one!</div></div>`;
    return card;
  }

  const coverUrl = anime.images?.jpg?.image_url;
  const score = anime.score ? `⭐ ${anime.score}` : null;
  const episodes = anime.episodes ? `${anime.episodes} eps` : anime.status === 'Currently Airing' ? 'Airing' : null;
  const type = anime.type || null;
  const genres = (anime.genres || []).slice(0, 3).map(g => g.name);
  const malUrl = anime.url;
  const displayTitle = anime.title_english || anime.title;

  card.innerHTML = `
    ${coverUrl
      ? `<img class="anime-cover" src="${coverUrl}" alt="${displayTitle}" loading="lazy"/>`
      : `<div class="anime-cover-placeholder">🎌</div>`
    }
    <div class="anime-info">
      <div class="anime-title">${displayTitle}</div>
      <div class="anime-meta">
        ${score ? `<span class="anime-badge badge-score">${score}</span>` : ''}
        ${episodes ? `<span class="anime-badge badge-eps">${episodes}</span>` : ''}
        ${type ? `<span class="anime-badge badge-type">${type}</span>` : ''}
      </div>
      ${genres.length ? `<div class="anime-genres">${genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}</div>` : ''}
      ${malUrl ? `<a class="anime-mal-link" href="${malUrl}" target="_blank">View on MAL →</a>` : ''}
      <a class="anime-mal-link" href="https://www.justwatch.com/in/search?q=${encodeURIComponent(displayTitle)}" target="_blank" style="color:rgba(99,179,237,0.8);">🎬 Where to watch in India →</a>
    </div>
  `;

  return card;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function addBubble(role, text) {
  const chatBox = document.getElementById('chatBox');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper ' + role;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'you' : 'nami';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.textContent = text;

  wrapper.appendChild(label);
  wrapper.appendChild(bubble);
  chatBox.appendChild(wrapper);
  chatBox.scrollTop = chatBox.scrollHeight;
}

let thinkingEl = null;

function showThinking() {
  const chatBox = document.getElementById('chatBox');
  thinkingEl = document.createElement('div');
  thinkingEl.className = 'thinking';
  thinkingEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chatBox.appendChild(thinkingEl);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function hideThinking() {
  if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
}
</script>

</body>
</html>
