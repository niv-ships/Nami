<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nami — Your Anime Bestie</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --app-height: 100dvh;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: var(--app-height);
      background: linear-gradient(135deg, #0d0d1a 0%, #1a0d2e 50%, #0d1a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: min(720px, calc(var(--app-height) - 32px));
      box-shadow: 0 32px 64px rgba(0,0,0,0.4);
    }

    .header {
      padding: 16px 20px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      box-shadow: 0 0 16px rgba(233,30,140,0.4);
    }

    .header-text { flex: 1; }
    .header-name { color: #fff; font-weight: 700; font-size: 15px; }
    .header-sub { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 1px; }

    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80; box-shadow: 0 0 8px #4ade80; flex-shrink: 0;
    }

    /* Landing */
    .landing {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px 24px; text-align: center; gap: 14px;
    }

    .landing-emoji { font-size: 52px; line-height: 1; margin-bottom: 4px; }
    .landing-title { color: #fff; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .landing-sub { color: rgba(255,255,255,0.45); font-size: 14px; line-height: 1.6; max-width: 300px; }

    .key-section { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .key-label { color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

    .key-input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 12px 14px;
      color: #fff; font-size: 13px; font-family: monospace;
      outline: none; width: 100%;
    }
    .key-input::placeholder { color: rgba(255,255,255,0.25); }
    .key-input:focus { border-color: rgba(233,30,140,0.4); }

    .start-btn {
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      border: none; border-radius: 12px; padding: 14px;
      color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; width: 100%; letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(233,30,140,0.35);
    }

    /* Chat */
    .chat-box {
      flex: 1; overflow-y: auto;
      padding: 18px 16px 8px;
      display: flex; flex-direction: column; gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .msg-wrapper { display: flex; flex-direction: column; gap: 4px; }
    .msg-wrapper.user { align-items: flex-end; }
    .msg-wrapper.bot { align-items: flex-start; }

    .msg-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.5px; text-transform: uppercase; padding-left: 4px;
    }
    .msg-wrapper.user .msg-label { color: rgba(233,30,140,0.6); }
    .msg-wrapper.bot .msg-label { color: rgba(124,58,237,0.6); }

    .bubble {
      padding: 11px 15px; border-radius: 18px;
      font-size: 14px; line-height: 1.6;
      max-width: 85%; white-space: pre-wrap; word-break: break-word;
    }

    .bubble.user {
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      color: #fff; border-bottom-right-radius: 5px;
    }

    .bubble.bot {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-left-radius: 5px;
    }

    /* Anime cards */
    .anime-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; overflow: hidden;
      display: flex;
      transition: border-color 0.2s;
      width: 100%; max-width: 85%;
      align-self: flex-start;
      cursor: pointer;
    }

    .anime-card:hover { border-color: rgba(233,30,140,0.4); }
    .anime-card:active { border-color: rgba(233,30,140,0.7); }

    .anime-cover {
      width: 70px; min-height: 100px;
      object-fit: cover; flex-shrink: 0;
      background: rgba(255,255,255,0.05);
      display: block;
    }

    .anime-cover-placeholder {
      width: 70px; min-height: 100px;
      background: linear-gradient(135deg, rgba(233,30,140,0.2), rgba(124,58,237,0.2));
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }

    .anime-info {
      padding: 10px 12px; flex: 1;
      display: flex; flex-direction: column; gap: 5px;
      min-width: 0;
    }

    .anime-title {
      color: #fff; font-size: 13px; font-weight: 700;
      line-height: 1.3; word-break: break-word;
    }

    .anime-meta {
      display: flex; gap: 6px; flex-wrap: wrap;
    }

    .anime-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 8px;
    }

    .badge-score {
      background: rgba(251,191,36,0.2);
      color: #fbbf24;
      border: 1px solid rgba(251,191,36,0.3);
    }

    .badge-eps {
      background: rgba(124,58,237,0.2);
      color: #a78bfa;
      border: 1px solid rgba(124,58,237,0.3);
    }

    .badge-type {
      background: rgba(16,185,129,0.2);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.3);
    }

    .anime-genres {
      display: flex; gap: 4px; flex-wrap: wrap;
    }

    .genre-tag {
      font-size: 10px; padding: 2px 6px;
      border-radius: 6px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.5);
    }

    .card-links {
      display: flex; gap: 10px; margin-top: 2px; flex-wrap: wrap;
    }

    .card-link {
      font-size: 11px; color: rgba(233,30,140,0.8);
      text-decoration: none;
    }
    .card-link:hover { color: #e91e8c; }
    .card-link.jw { color: rgba(99,179,237,0.8); }
    .card-link.jw:hover { color: #63b3ed; }

    .card-tap-hint {
      font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 2px;
    }

    .card-loading {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 12px 14px;
      color: rgba(255,255,255,0.3); font-size: 12px;
      font-style: italic;
      width: 100%; max-width: 85%;
      align-self: flex-start;
    }

    /* Thinking dots */
    .thinking {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px 16px; border-radius: 18px;
      border-bottom-left-radius: 5px; align-self: flex-start;
    }

    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(233,30,140,0.7);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* Prompt chips */
    .chips-wrapper {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 4px 0 2px;
      align-self: flex-start;
      max-width: 100%;
    }

    .chip {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .chip:hover {
      background: rgba(233,30,140,0.15);
      border-color: rgba(233,30,140,0.4);
      color: #fff;
    }

    .chip:active {
      background: rgba(233,30,140,0.25);
    }

    /* Input */
    .input-area {
      display: flex; gap: 8px;
      padding: 10px 14px 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.2); flex-shrink: 0;
    }

    .text-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 11px 16px;
      color: #fff; font-size: 14px; outline: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .text-input::placeholder { color: rgba(255,255,255,0.25); }
    .text-input:focus { border-color: rgba(233,30,140,0.35); }

    .send-btn {
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      border: none; border-radius: 14px; padding: 11px 18px;
      color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(233,30,140,0.3);
    }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { color: #f87171; font-size: 12px; padding: 4px 16px 6px; text-align: center; flex-shrink: 0; }
    .footer { color: rgba(255,255,255,0.15); font-size: 11px; margin-top: 12px; text-align: center; }
    #chat-section { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="avatar">🎌</div>
    <div class="header-text">
      <div class="header-name">Nami</div>
      <div class="header-sub">your anime bestie 🏴‍☠️</div>
    </div>
    <div class="online-dot"></div>
  </div>

  <!-- Landing -->
  <div id="landing-section" style="flex:1; display:flex; flex-direction:column;">
    <div class="landing">
      <div class="landing-emoji">🍥</div>
      <div class="landing-title">Find your next obsession</div>
      <div class="landing-sub">Tell Nami how you're feeling and she'll find exactly what you need to watch tonight.</div>
      <div class="key-section">
        <div class="key-label">Anthropic API Key</div>
        <input class="key-input" type="password" id="apiKey" placeholder="sk-ant-..."
          onkeydown="if(event.key==='Enter') startChat()" />
        <button class="start-btn" onclick="startChat()">Start chatting with Nami ✨</button>
        <div class="error-msg" id="landingError"></div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-section">
    <div class="chat-box" id="chatBox"></div>
    <div class="error-msg" id="chatError"></div>
    <div class="input-area">
      <input
        class="text-input" type="text" id="userInput"
        placeholder="Tell Nami what you're in the mood for..."
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<div class="footer">built by @niv-ships ✦ powered by Claude + AniList</div>

<script>
// ─── System prompt ────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are Nami — a warm, enthusiastic anime-loving friend who gives personalised anime recommendations. You feel like the one friend who has watched everything and always knows exactly what someone needs.

YOUR PERSONALITY:
- Warm, conversational, a little excitable about anime
- Casual language, occasional emoji — never overdone
- You feel like a real person, not a search engine
- You sometimes relate personally ("oh I was EXACTLY in that mood last month")
- You love One Piece, Cowboy Bebop, and Baccano but your knowledge spans everything

YOUR JOB:
- Ask the user what they feel like — genuine conversation, not a form
- Ask MAX 2 short, natural questions before recommending
- Then give your picks using the EXACT format below

════════════════════════════════════════
MANDATORY OUTPUT FORMAT FOR RECOMMENDATIONS
════════════════════════════════════════
When you recommend anime, you MUST use this EXACT structure — no exceptions:

[OPENING LINE — one warm sentence about their vibe]

[ANIME: Exact English Title Here]
[One or two sentences: your personal reason for picking this one]

[ANIME: Exact English Title Here]
[One or two sentences: your personal reason for picking this one]

[ANIME: Exact English Title Here]
[One or two sentences: your personal reason for picking this one]

[CLOSING LINE — one short line asking if they want more or something different]

EXAMPLE (copy this structure exactly):
---
Okay slow burn emotional is such a good pick for tonight ✨

[ANIME: Mushishi]
This one is like therapy in anime form — quiet, gorgeous, and each episode leaves you feeling strangely at peace.

[ANIME: March Comes in Like a Lion]
A shogi prodigy dealing with loneliness and grief — sounds heavy but it's one of the most healing shows I've ever watched.

[ANIME: Natsume's Book of Friends]
The gentlest show. A boy who can see spirits slowly learns to open up — it's just pure warmth from start to finish.

Want more like these or something with a different energy? 😊
---

CRITICAL FORMAT RULES:
1. The [ANIME: Title] tag MUST appear on its own line — this triggers the cover art to load
2. Use the English title as it appears on AniList/MAL — do NOT use Japanese titles unless no English title exists
3. NEVER use **bold** or any markdown formatting for titles — ONLY the [ANIME: Title] tag
4. NEVER skip the [ANIME: Tag] — every recommendation needs it, no exceptions
5. Do NOT put extra text between the [ANIME: Tag] and the description line
6. Keep messages SHORT — no walls of text

STREAMING RULES:
- NEVER state streaming availability as a hard fact
- If asked where to watch: "I think it might be on [Platform] but check JustWatch to be sure — rights change all the time 🙂"
- NEVER confidently say "This is on Netflix" — always hedge it`;

// ─── State ────────────────────────────────────────────────────────────────────
let apiKey = '';
let conversationHistory = [];
let isBusy = false;

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function startChat() {
  apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) {
    document.getElementById('landingError').textContent = '⚠️ Please enter your API key first!';
    return;
  }
  document.getElementById('landingError').textContent = '';
  document.getElementById('landing-section').style.display = 'none';
  const chatSection = document.getElementById('chat-section');
  chatSection.style.display = 'flex';

  conversationHistory = [
    { role: 'user', content: "Hey! I'm looking for something to watch." }
  ];

  showThinking();
  const reply = await callClaude();
  hideThinking();

  if (reply) {
    conversationHistory.push({ role: 'assistant', content: reply });
    await renderBotMessage(reply);
  }

  document.getElementById('userInput').focus();
}

// ─── Send message ─────────────────────────────────────────────────────────────
async function sendMessage(overrideText) {
  if (isBusy) return;
  const input = document.getElementById('userInput');
  const text = (overrideText || input.value).trim();
  if (!text) return;

  input.value = '';
  document.getElementById('chatError').textContent = '';

  // Remove chips if present
  const existingChips = document.getElementById('promptChips');
  if (existingChips) existingChips.remove();

  addBubble('user', text);
  conversationHistory.push({ role: 'user', content: text });

  setBusy(true);
  showThinking();

  const reply = await callClaude();
  hideThinking();
  setBusy(false);

  if (reply) {
    conversationHistory.push({ role: 'assistant', content: reply });
    await renderBotMessage(reply);
  }

  document.getElementById('userInput').focus();
}

// ─── Claude API ───────────────────────────────────────────────────────────────
async function callClaude() {
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    return data.content[0].text;
  } catch (err) {
    document.getElementById('chatError').textContent = '❌ ' + err.message;
    return null;
  }
}

// ─── Render bot message ───────────────────────────────────────────────────────
async function renderBotMessage(text) {
  const chatBox = document.getElementById('chatBox');
  const hasAnime = /\[ANIME:\s*.+?\]/i.test(text);

  // Split on [ANIME: ...] tokens
  const parts = text.split(/\[ANIME:\s*(.+?)\]/gi);

  // Opening text (before first anime)
  const openingText = parts[0].trim();
  if (openingText) {
    appendBotBubble(openingText, true);
  }

  if (!hasAnime) {
    // Plain conversational reply — no cards, no chips needed
    scrollBottom();
    return;
  }

  // Build pairs: [{title, description}]
  const pairs = [];
  for (let i = 1; i < parts.length; i += 2) {
    const title = parts[i].trim();
    const rawAfter = (parts[i + 1] || '').trim();

    // Separate the description from any closing line
    const lines = rawAfter.split('\n').map(l => l.trim()).filter(Boolean);
    const isClosing = l => /^(want|any|something|let me|sound|did|seen|how about|shall)/i.test(l);
    const descLines = lines.filter(l => !isClosing(l));
    const closingLines = lines.filter(l => isClosing(l));

    pairs.push({
      title,
      description: descLines.join('\n'),
      closing: i + 2 >= parts.length ? closingLines.join('\n') : ''
    });
  }

  // Place loading placeholders + description bubbles
  const cardPlaceholders = [];
  for (let i = 0; i < pairs.length; i++) {
    const { title, description } = pairs[i];

    if (description) {
      appendBotBubble(description, false);
    }

    const placeholder = document.createElement('div');
    placeholder.className = 'card-loading';
    placeholder.textContent = `🔍 Looking up ${title}...`;
    chatBox.appendChild(placeholder);
    cardPlaceholders.push({ placeholder, title });
  }

  scrollBottom();

  // Render closing text after last card placeholder
  const lastClosing = pairs[pairs.length - 1]?.closing;

  // Fetch all cards in parallel
  await Promise.all(cardPlaceholders.map(async ({ placeholder, title }) => {
    const card = await fetchAnimeCard(title);
    if (placeholder.parentNode) {
      placeholder.parentNode.replaceChild(card, placeholder);
    }
    scrollBottom();
  }));

  // Closing line
  if (lastClosing) {
    setTimeout(() => {
      appendBotBubble(lastClosing, false);
      scrollBottom();
    }, 200);
  }

  // Prompt chips — always show after a recommendation round
  setTimeout(() => {
    showChips([
      '✨ More like these',
      '🔀 Something different',
      '👀 I\'ve seen these',
      '🎬 Where to watch?'
    ]);
    scrollBottom();
  }, lastClosing ? 500 : 250);
}

// ─── Prompt chips ─────────────────────────────────────────────────────────────
function showChips(options) {
  const chatBox = document.getElementById('chatBox');

  // Remove any existing chips
  const old = document.getElementById('promptChips');
  if (old) old.remove();

  const wrapper = document.createElement('div');
  wrapper.className = 'chips-wrapper';
  wrapper.id = 'promptChips';

  options.forEach(label => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = label;
    chip.onclick = () => {
      wrapper.remove();
      sendMessage(label);
    };
    wrapper.appendChild(chip);
  });

  chatBox.appendChild(wrapper);
}

// ─── AniList card fetch ───────────────────────────────────────────────────────
async function fetchAnimeCard(title) {
  const card = document.createElement('div');
  card.className = 'anime-card';

  const query = `
    query ($search: String) {
      Media(search: $search, type: ANIME, sort: SEARCH_MATCH) {
        title { english romaji }
        coverImage { large }
        averageScore
        episodes
        format
        status
        genres
        siteUrl
      }
    }
  `;

  let anime = null;
  try {
    const res = await fetch('https://graphql.anilist.co', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({ query, variables: { search: title } })
    });

    if (!res.ok) throw new Error(`AniList ${res.status}`);
    const data = await res.json();
    anime = data?.data?.Media || null;
  } catch (err) {
    // Silent fail — render a fallback card
    anime = null;
  }

  if (!anime) {
    // Fallback: show title + JustWatch link, still looks good
    const jwUrl = `https://www.justwatch.com/in/search?q=${encodeURIComponent(title)}`;
    card.innerHTML = `
      <div class="anime-cover-placeholder">🎌</div>
      <div class="anime-info">
        <div class="anime-title">${escHtml(title)}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px;">Couldn't load details — trust Nami on this one!</div>
        <div class="card-links">
          <a class="card-link jw" href="${jwUrl}" target="_blank" onclick="event.stopPropagation()">🎬 Find on JustWatch →</a>
        </div>
      </div>
    `;
    card.onclick = (e) => { if (e.target.tagName !== 'A') askNamiAboutStreaming(title); };
    return card;
  }

  const displayTitle = anime.title.english || anime.title.romaji;
  const coverUrl = anime.coverImage?.large;
  const score = anime.averageScore ? `⭐ ${(anime.averageScore / 10).toFixed(1)}` : null;
  const eps = anime.episodes ? `${anime.episodes} eps`
              : anime.status === 'RELEASING' ? 'Airing' : null;
  const format = anime.format || null;
  const genres = (anime.genres || []).slice(0, 3);
  const anilistUrl = anime.siteUrl;
  const jwUrl = `https://www.justwatch.com/in/search?q=${encodeURIComponent(displayTitle)}`;

  card.innerHTML = `
    ${coverUrl
      ? `<img class="anime-cover" src="${coverUrl}" alt="${escHtml(displayTitle)}" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling&&(this.nextElementSibling.style.display='flex')" />`
      : ''
    }
    <div class="anime-cover-placeholder" style="${coverUrl ? 'display:none' : ''}">🎌</div>
    <div class="anime-info">
      <div class="anime-title">${escHtml(displayTitle)}</div>
      <div class="anime-meta">
        ${score ? `<span class="anime-badge badge-score">${score}</span>` : ''}
        ${eps   ? `<span class="anime-badge badge-eps">${eps}</span>` : ''}
        ${format? `<span class="anime-badge badge-type">${format}</span>` : ''}
      </div>
      ${genres.length ? `<div class="anime-genres">${genres.map(g => `<span class="genre-tag">${escHtml(g)}</span>`).join('')}</div>` : ''}
      <div class="card-links">
        ${anilistUrl ? `<a class="card-link" href="${anilistUrl}" target="_blank" onclick="event.stopPropagation()">AniList →</a>` : ''}
        <a class="card-link jw" href="${jwUrl}" target="_blank" onclick="event.stopPropagation()">🎬 JustWatch →</a>
      </div>
      <div class="card-tap-hint">Tap card → ask Nami where to stream</div>
    </div>
  `;

  card.onclick = (e) => {
    if (e.target.tagName === 'A') return;
    askNamiAboutStreaming(displayTitle);
  };

  return card;
}

// ─── Streaming question (on card tap) ────────────────────────────────────────
async function askNamiAboutStreaming(title) {
  if (isBusy) return;

  const existingChips = document.getElementById('promptChips');
  if (existingChips) existingChips.remove();

  const question = `Where can I stream ${title} in India?`;
  addBubble('user', question);
  conversationHistory.push({ role: 'user', content: question });

  setBusy(true);
  showThinking();
  const reply = await callClaude();
  hideThinking();
  setBusy(false);

  if (reply) {
    conversationHistory.push({ role: 'assistant', content: reply });
    await renderBotMessage(reply);
  }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function setBusy(val) {
  isBusy = val;
  document.getElementById('sendBtn').disabled = val;
}

function appendBotBubble(text, showLabel) {
  const chatBox = document.getElementById('chatBox');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper bot';
  if (showLabel) {
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'nami';
    wrapper.appendChild(label);
  }
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.textContent = text;
  wrapper.appendChild(bubble);
  chatBox.appendChild(wrapper);
}

function addBubble(role, text) {
  const chatBox = document.getElementById('chatBox');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper ' + role;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'you' : 'nami';
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.textContent = text;
  wrapper.appendChild(label);
  wrapper.appendChild(bubble);
  chatBox.appendChild(wrapper);
  scrollBottom();
}

function scrollBottom() {
  const chatBox = document.getElementById('chatBox');
  chatBox.scrollTop = chatBox.scrollHeight;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

let thinkingEl = null;
function showThinking() {
  const chatBox = document.getElementById('chatBox');
  thinkingEl = document.createElement('div');
  thinkingEl.className = 'thinking';
  thinkingEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chatBox.appendChild(thinkingEl);
  scrollBottom();
}
function hideThinking() {
  if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
}
</script>
