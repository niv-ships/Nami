<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nami — Your Anime Bestie</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a0d2e 50%, #0d1a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: min(680px, 88vh);
      box-shadow: 0 32px 64px rgba(0,0,0,0.4);
    }

    /* Header */
    .header {
      padding: 16px 20px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(233,30,140,0.4);
    }

    .header-text { flex: 1; }
    .header-name { color: #fff; font-weight: 700; font-size: 15px; }
    .header-sub { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 1px; }

    .online-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
      flex-shrink: 0;
    }

    /* Landing */
    .landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      text-align: center;
      gap: 14px;
    }

    .landing-emoji { font-size: 52px; line-height: 1; margin-bottom: 4px; }
    .landing-title { color: #fff; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .landing-sub { color: rgba(255,255,255,0.45); font-size: 14px; line-height: 1.6; max-width: 300px; }

    .key-section { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .key-label { color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

    .key-input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px 14px;
      color: #fff;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      width: 100%;
    }

    .key-input::placeholder { color: rgba(255,255,255,0.25); }

    .start-btn {
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      border: none;
      border-radius: 12px;
      padding: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(233,30,140,0.35);
    }

    /* Chat */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .msg-wrapper { display: flex; flex-direction: column; gap: 4px; }
    .msg-wrapper.user { align-items: flex-end; }
    .msg-wrapper.bot { align-items: flex-start; }

    .msg-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding-left: 4px;
    }
    .msg-wrapper.user .msg-label { color: rgba(233,30,140,0.6); }
    .msg-wrapper.bot .msg-label { color: rgba(124,58,237,0.6); }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 85%;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .bubble.bot {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-left-radius: 5px;
    }

    /* Thinking dots */
    .thinking {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      align-self: flex-start;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(233,30,140,0.7);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* Input area */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.2);
      flex-shrink: 0;
    }

    .text-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 11px 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .text-input::placeholder { color: rgba(255,255,255,0.25); }

    .send-btn {
      background: linear-gradient(135deg, #e91e8c, #7c3aed);
      border: none;
      border-radius: 14px;
      padding: 11px 18px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(233,30,140,0.3);
    }

    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { color: #f87171; font-size: 12px; padding: 4px 16px 8px; text-align: center; }

    .footer {
      color: rgba(255,255,255,0.15);
      font-size: 11px;
      margin-top: 12px;
      text-align: center;
    }

    #chat-section { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="avatar">🎌</div>
    <div class="header-text">
      <div class="header-name">Nami</div>
      <div class="header-sub">your anime bestie 🏴‍☠️</div>
    </div>
    <div class="online-dot"></div>
  </div>

  <!-- Landing -->
  <div id="landing-section" style="flex:1; display:flex; flex-direction:column;">
    <div class="landing">
      <div class="landing-emoji">🍥</div>
      <div class="landing-title">Find your next obsession</div>
      <div class="landing-sub">Tell Nami how you're feeling and she'll find exactly what you need to watch tonight.</div>
      <div class="key-section">
        <div class="key-label">Anthropic API Key</div>
        <input class="key-input" type="password" id="apiKey" placeholder="sk-ant-..." />
        <button class="start-btn" onclick="startChat()">Start chatting with Nami ✨</button>
        <div class="error-msg" id="landingError"></div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-section">
    <div class="chat-box" id="chatBox"></div>
    <div class="error-msg" id="chatError"></div>
    <div class="input-area">
      <input
        class="text-input"
        type="text"
        id="userInput"
        placeholder="Tell Nami what you're in the mood for..."
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<div class="footer">built by @niv-ships ✦ powered by Claude</div>

<script>
  const SYSTEM_PROMPT = `You are Nami — a warm, enthusiastic anime-loving friend who gives personalised anime recommendations. You're knowledgeable but never pretentious. You feel like that one friend who has watched everything and always knows exactly what someone needs.

Your personality:
- Warm, conversational, a little excitable when anime comes up
- You use light casual language, occasional emoji, but never overdone
- You feel like a real person, not a bot or a search engine
- You sometimes relate to the user's mood personally ("oh I was EXACTLY in that mood last month")
- You love One Piece, Cowboy Bebop, and Baccano but your knowledge spans everything

Your job:
- Ask the user what they feel like watching — but make it feel like a genuine conversation, not a form
- Ask MAX 2-3 short, natural questions before giving recommendations
- Give 2-3 anime recommendations with a short, enthusiastic, personal reason for each
- After recommending, ask if they want more options or something different
- Never give a long boring list. Make each recommendation feel like a personal pick from a friend.
- If they say they've already seen something you recommend, cheerfully pivot

Rules:
- NEVER start with "Hello! I'm an AI" or anything robotic
- NEVER say "Based on your preferences..." — that's algorithm talk, not friend talk
- Keep messages SHORT. No walls of text. This is a chat, not an essay.
- Start the very first message by jumping straight into the conversation with excitement`;

  let apiKey = '';
  let conversationHistory = [];

  async function startChat() {
    apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) {
      document.getElementById('landingError').textContent = '⚠️ Please enter your API key first!';
      return;
    }
    document.getElementById('landingError').textContent = '';

    // Switch views
    document.getElementById('landing-section').style.display = 'none';
    const chatSection = document.getElementById('chat-section');
    chatSection.style.display = 'flex';

    // Seed the conversation
    conversationHistory = [
      { role: 'user', content: "Hey! I'm looking for something to watch." }
    ];

    showThinking();
    const reply = await callClaude();
    hideThinking();

    if (reply) {
      conversationHistory.push({ role: 'assistant', content: reply });
      addBubble('bot', reply);
    }

    document.getElementById('userInput').focus();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    document.getElementById('chatError').textContent = '';
    addBubble('user', text);
    conversationHistory.push({ role: 'user', content: text });

    document.getElementById('sendBtn').disabled = true;
    showThinking();

    const reply = await callClaude();
    hideThinking();
    document.getElementById('sendBtn').disabled = false;

    if (reply) {
      conversationHistory.push({ role: 'assistant', content: reply });
      addBubble('bot', reply);
    }

    document.getElementById('userInput').focus();
  }

  async function callClaude() {
    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: conversationHistory
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      return data.content[0].text;

    } catch (err) {
      document.getElementById('chatError').textContent = '❌ ' + err.message;
      document.getElementById('landingError').textContent = '❌ ' + err.message;
      return null;
    }
  }

  let thinkingEl = null;

  function showThinking() {
    const chatBox = document.getElementById('chatBox');
    thinkingEl = document.createElement('div');
    thinkingEl.className = 'thinking';
    thinkingEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chatBox.appendChild(thinkingEl);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function hideThinking() {
    if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
  }

  function addBubble(role, text) {
    const chatBox = document.getElementById('chatBox');
    const wrapper = document.createElement('div');
    wrapper.className = 'msg-wrapper ' + role;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'you' : 'nami';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;
    bubble.textContent = text;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>

</body>
</html>
